    <!-- Upper eyelid curve (C shape) -->
    <path d="M8 35 C8 10, 35 -5, 55 5 C60 7, 62 10, 58 14 C42 6, 22 14, 18 35" fill="#2563EB"/>
    <!-- Lower eyelid curve (S shape) -->
    <path d="M18 35 C22 56, 42 64, 58 56 C62 60, 60 63, 55 65 C35 75, 8 60, 8 35" fill="#2563EB"/>
    <!-- Flowing wave extension -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" fill="none">
  <!-- Upper arc / C-shape (white) — forms the top of the eye -->
  <path d="M10 42 C10 18, 30 4, 55 8 C65 10, 70 14, 68 18 C58 10, 32 12, 22 38"
        fill="white"/>

  <!-- Lower S-wave (blue) — forms the bottom of the eye and the flowing tail -->
  <path d="M22 42 C24 56, 36 64, 55 62 C64 60, 70 54, 68 48
            C74 52, 82 48, 88 40 C94 32, 96 20, 90 14
            C86 18, 84 26, 78 34 C72 42, 65 44, 55 42"
        fill="#2563EB"/>

  <!-- Blue focus dot / iris -->
  <circle cx="36" cy="40" r="11" fill="#2563EB"/>

  <!-- Inner pupil highlight -->
  <circle cx="36" cy="40" r="5" fill="#020817"/>
  <circle cx="33" cy="37" r="2" fill="white" opacity="0.3"/>
</svg>
